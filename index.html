<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStory Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9F8F4;
    --fg: #2D3A31;
    --sage: #8C9A84;
    --clay: #DCCFC2;
    --clay-light: #F2F0EB;
    --stone: #E6E2DA;
    --terracotta: #C27B66;
    --white: #FFFFFF;
    --shadow-xl: 0 25px 50px -12px rgba(45,58,49,0.15);
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Source Sans 3', 'Segoe UI', sans-serif;
    --radius-card: 24px;
    --radius-pill: 9999px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.7;
    font-weight: 400;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .grain-overlay {
    pointer-events: none; position: fixed; inset: 0; z-index: 9999; opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-repeat: repeat;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
  .fade-in {
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ===== HEADER ===== */
  .site-header { padding: 5rem 0 3rem; text-align: center; }
  .site-header::after {
    content: ''; display: block; width: 60px; height: 1px;
    background: var(--sage); margin: 2rem auto 0;
  }
  .site-title {
    font-family: var(--serif); font-size: 3.5rem; font-weight: 700;
    color: var(--fg); letter-spacing: -0.02em; line-height: 1.1;
  }
  .site-title em { font-style: italic; color: var(--sage); }
  .site-date {
    font-family: var(--serif); font-size: 1.15rem; font-weight: 400;
    font-style: italic; color: var(--sage); margin-top: 1.25rem;
  }

  /* ===== SECTION ===== */
  .section { padding: 2.5rem 0; }
  .section-header {
    display: flex; align-items: baseline; gap: 0.75rem;
    margin-bottom: 1.75rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--stone);
  }
  .section-icon { font-size: 1.3rem; flex-shrink: 0; }
  .section-title {
    font-family: var(--serif); font-size: 1.6rem; font-weight: 600; color: var(--fg);
  }
  .section-count {
    font-family: var(--sans); font-size: 0.75rem; color: var(--sage);
    margin-left: auto; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ===== CARDS ===== */
  .card-list { display: flex; flex-direction: column; gap: 1rem; }
  .card {
    background: var(--white); border: 1px solid var(--stone);
    border-radius: var(--radius-card); padding: 1.5rem 1.75rem;
    transition: box-shadow 0.5s ease-out; position: relative; cursor: pointer;
  }
  .card:hover { box-shadow: var(--shadow-xl); }
  .card-head { display: flex; align-items: flex-start; gap: 0.75rem; }
  .card-body { flex: 1; }
  .card-title {
    font-family: var(--serif); font-size: 1.1rem; font-weight: 600;
    color: var(--fg); line-height: 1.4; transition: color 0.3s ease;
  }
  .card:hover .card-title { color: var(--terracotta); }
  .card-date {
    font-size: 0.75rem; color: var(--clay); font-weight: 400;
    margin-top: 0.3rem; font-style: italic;
  }
  .card-preview {
    font-size: 0.88rem; color: var(--sage); margin-top: 0.5rem;
    line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta {
    display: flex; align-items: center; gap: 0.4rem;
    margin-top: 0.75rem; flex-wrap: wrap;
  }
  .source-pill {
    display: inline-block; font-size: 0.6rem; font-weight: 600;
    padding: 0.15rem 0.5rem; border-radius: var(--radius-pill);
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--white); background: var(--fg);
  }
  .src-hacker_news { background: #D4764E; }
  .src-github_trending, .src-github_releases { background: var(--sage); }
  .src-reddit_programming, .src-reddit_ml, .src-reddit_experienceddevs { background: #B85A4A; }
  .src-techcrunch { background: #5B8A6A; }
  .src-lobsters { background: #9E5B5B; }
  .src-tldr { background: #7B7FA3; }
  .src-vercel_blog { background: var(--fg); }
  .src-huggingface_blog { background: #C2923C; }
  .src-devto { background: #6B7E73; }
  .tag-pill {
    display: inline-block; font-size: 0.6rem; font-weight: 500;
    padding: 0.1rem 0.45rem; border-radius: var(--radius-pill);
    border: 1px solid var(--stone); color: var(--sage); letter-spacing: 0.03em;
  }
  .score-badge {
    margin-left: auto; font-family: var(--serif); font-size: 0.8rem;
    font-weight: 600; color: var(--terracotta); white-space: nowrap;
  }

  /* ===== EXPANDED DETAIL ===== */
  .card-detail {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.5s ease-out, opacity 0.4s ease-out, margin-top 0.4s ease-out;
    margin-top: 0;
  }
  .card.open .card-detail { max-height: 600px; opacity: 1; margin-top: 1.25rem; }
  .card.open .card-preview { display: none; }
  .card.open { background: var(--clay-light); }
  .detail-divider {
    border: none; border-top: 1px solid var(--stone); margin: 0 0 1rem;
  }
  .detail-text {
    font-size: 0.95rem; color: var(--fg); line-height: 1.8; font-weight: 400;
  }
  .detail-origin {
    display: inline-flex; align-items: center; gap: 0.35rem;
    margin-top: 1.25rem; font-size: 0.8rem; font-weight: 500;
    color: var(--sage); text-decoration: none;
    padding: 0.4rem 0.9rem; border: 1px solid var(--stone);
    border-radius: var(--radius-pill); transition: all 0.3s ease;
  }
  .detail-origin:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .detail-arrow {
    display: inline-block; transition: transform 0.3s ease; font-size: 0.9rem;
  }
  .detail-origin:hover .detail-arrow { transform: translateX(3px); }

  /* ===== VINE ===== */
  .vine-separator { display: block; margin: 1.5rem auto; opacity: 0.3; }

  /* ===== FAILED ===== */
  .failed-section {
    margin: 3rem 0; padding: 1.5rem 2rem; background: var(--clay-light);
    border-radius: var(--radius-card); border: 1px solid var(--stone);
  }
  .failed-toggle {
    cursor: pointer; font-size: 0.85rem; color: var(--sage);
    font-weight: 500; letter-spacing: 0.05em; list-style: none;
  }
  .failed-toggle::-webkit-details-marker { display: none; }
  .failed-toggle::before {
    content: '\203A'; display: inline-block; margin-right: 0.5rem;
    transition: transform 0.3s ease; font-size: 1rem;
  }
  details[open] .failed-toggle::before { transform: rotate(90deg); }
  .failed-list { margin-top: 0.75rem; line-height: 2; }
  .failed-item {
    display: inline-block; padding: 0.15rem 0.6rem; margin: 0.15rem;
    background: var(--white); border: 1px solid var(--stone);
    border-radius: var(--radius-pill); font-size: 0.7rem; color: var(--sage);
  }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center; padding: 4rem 0 3rem; color: var(--sage);
    font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .site-footer::before {
    content: ''; display: block; width: 40px; height: 1px;
    background: var(--stone); margin: 0 auto 2rem;
  }

  @media (max-width: 767px) {
    .site-header { padding: 3rem 0 2rem; }
    .site-title { font-size: 2.5rem; }
    .site-date { font-size: 1rem; }
    .section { padding: 1.5rem 0; }
    .section-title { font-size: 1.3rem; }
    .card { padding: 1.25rem; }
    .card-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="grain-overlay" aria-hidden="true"></div>

<div class="container">
  <header class="site-header fade-in">
    <h1 class="site-title">Dev<em>Story</em></h1>
    <p class="site-date" id="dateLine"></p>
  </header>

  <main id="content"></main>

  <details class="failed-section fade-in" id="failedSection" style="display:none">
    <summary class="failed-toggle">실패한 소스 보기</summary>
    <div class="failed-list" id="failedList"></div>
  </details>

  <footer class="site-footer">
    <span>Collected by DevStory</span>
  </footer>
</div>

<script>
var CATEGORY_CONFIG = {
  news_blogs:  { icon: '\u{1F343}', label: '\uB274\uC2A4 & \uBE14\uB85C\uADF8' },
  ai_research: { icon: '\u{1F52C}', label: 'AI & ML \uB9AC\uC11C\uCE58' },
  github_oss:  { icon: '\u{1F331}', label: 'GitHub & \uC624\uD508\uC18C\uC2A4' },
  community:   { icon: '\u{1F33F}', label: '\uCEE4\uBBA4\uB2C8\uD2F0 \uD1A0\uB860' },
  eng_blogs:   { icon: '\u{1FAB4}', label: '\uC5D4\uC9C0\uB2C8\uC5B4\uB9C1 \uBE14\uB85C\uADF8' }
};

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      var v = attrs[k];
      if (k === 'className') e.className = v;
      else if (k === 'textContent') e.textContent = v;
      else e.setAttribute(k, v);
    }
  }
  if (children) {
    var list = Array.isArray(children) ? children : [children];
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      if (!c) continue;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    }
  }
  return e;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  var month = d.getMonth() + 1;
  var day = d.getDate();
  var hours = d.getHours();
  var mins = String(d.getMinutes()).padStart(2, '0');
  return month + '\uC6D4 ' + day + '\uC77C ' + hours + ':' + mins;
}

function createVineSvg() {
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '120');
  svg.setAttribute('height', '24');
  svg.setAttribute('viewBox', '0 0 120 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('class', 'vine-separator');
  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M0 12 Q20 2 40 12 Q60 22 80 12 Q100 2 120 12');
  path.setAttribute('stroke', '#8C9A84');
  path.setAttribute('stroke-width', '1');
  svg.appendChild(path);
  return svg;
}

function createCard(item) {
  var card = el('div', { className: 'card fade-in' });

  // Clickable area
  card.addEventListener('click', function(e) {
    if (e.target.closest('.detail-origin')) return;
    card.classList.toggle('open');
  });

  // Title
  card.appendChild(el('div', { className: 'card-title', textContent: item.title_ko }));

  // Published date
  var pubDate = formatDate(item.published_at);
  if (pubDate) {
    card.appendChild(el('div', { className: 'card-date', textContent: pubDate }));
  }

  // Preview (collapsed summary, 2 lines max)
  card.appendChild(el('p', { className: 'card-preview', textContent: item.summary_ko }));

  // Meta: source + tags + score
  var meta = el('div', { className: 'card-meta' });
  var srcClass = 'source-pill src-' + item.source.replace(/[^a-z_]/g, '');
  meta.appendChild(el('span', { className: srcClass, textContent: item.source }));
  var tags = (item.tags || []).slice(0, 3);
  for (var i = 0; i < tags.length; i++) {
    meta.appendChild(el('span', { className: 'tag-pill', textContent: tags[i] }));
  }
  meta.appendChild(el('span', { className: 'score-badge', textContent: '\u2736 ' + item.score }));
  card.appendChild(meta);

  // Expandable detail panel
  var detail = el('div', { className: 'card-detail' });
  detail.appendChild(el('hr', { className: 'detail-divider' }));
  var detailContent = item.detail_ko || item.summary_ko;
  var paragraphs = detailContent.split('\n').filter(function(p) { return p.trim().length > 0; });
  for (var pi = 0; pi < paragraphs.length; pi++) {
    var p = el('p', { className: 'detail-text', textContent: paragraphs[pi].trim() });
    if (pi < paragraphs.length - 1) p.style.marginBottom = '0.75rem';
    detail.appendChild(p);
  }

  var originLink = el('a', {
    className: 'detail-origin',
    href: item.url,
    target: '_blank',
    rel: 'noopener'
  });
  originLink.appendChild(document.createTextNode('\uC6D0\uBB38 \uBCF4\uAE30'));
  originLink.appendChild(el('span', { className: 'detail-arrow', textContent: '\u2192' }));
  detail.appendChild(originLink);

  card.appendChild(detail);

  return card;
}

function createSection(icon, label, items) {
  var section = el('div', { className: 'section fade-in' });

  var header = el('div', { className: 'section-header' });
  header.appendChild(el('span', { className: 'section-icon', textContent: icon }));
  header.appendChild(el('h2', { className: 'section-title', textContent: label }));
  header.appendChild(el('span', { className: 'section-count', textContent: items.length + ' items' }));
  section.appendChild(header);

  var list = el('div', { className: 'card-list' });
  for (var i = 0; i < items.length; i++) {
    list.appendChild(createCard(items[i]));
  }
  section.appendChild(list);

  return section;
}

function setupScrollAnimation() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.fade-in').forEach(function(e) { observer.observe(e); });
}

async function load() {
  var res = await fetch('data/2026/03/22/raw.json');
  var data = await res.json();
  var items = data.items;
  var meta = data.meta;

  // Header date
  var dateObj = new Date(data.collected_at);
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  var weekdays = ['\uC77C', '\uC6D4', '\uD654', '\uC218', '\uBAA9', '\uAE08', '\uD1A0'];
  var dow = weekdays[dateObj.getDay()];
  var timeStr = dateObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('dateLine').textContent =
    y + '\uB144 ' + m + '\uC6D4 ' + d + '\uC77C ' + dow + '\uC694\uC77C \u00B7 ' + timeStr + ' \uC218\uC9D1';

  var content = document.getElementById('content');

  // Category sections only
  var categories = ['news_blogs', 'ai_research', 'github_oss', 'community', 'eng_blogs'];
  var rendered = 0;
  for (var c = 0; c < categories.length; c++) {
    var cat = categories[c];
    var catItems = items.filter(function(it) { return it.category === cat; });
    if (catItems.length === 0) continue;
    if (rendered > 0) content.appendChild(createVineSvg());
    var cfg = CATEGORY_CONFIG[cat];
    content.appendChild(createSection(cfg.icon, cfg.label, catItems));
    rendered++;
  }

  // Failed sources
  if (meta.sources_failed.length > 0) {
    var failedSection = document.getElementById('failedSection');
    failedSection.style.display = 'block';
    var failedList = document.getElementById('failedList');
    for (var f = 0; f < meta.sources_failed.length; f++) {
      failedList.appendChild(el('span', { className: 'failed-item', textContent: meta.sources_failed[f] }));
    }
  }

  requestAnimationFrame(function() { setupScrollAnimation(); });
}

load();
</script>
</body>
</html>
