<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStory Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== LIGHT (default) ===== */
  :root {
    --bg: #F9F8F4; --fg: #2D3A31; --sage: #8C9A84; --clay: #DCCFC2;
    --clay-light: #F2F0EB; --stone: #E6E2DA; --terracotta: #C27B66;
    --card-bg: #FFFFFF; --shadow-xl: 0 25px 50px -12px rgba(45,58,49,0.15);
    --grain-opacity: 0.015;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Source Sans 3', 'Segoe UI', sans-serif;
    --radius-card: 24px; --radius-pill: 9999px;
  }
  /* ===== DARK ===== */
  html.dark {
    --bg: #1a1f1c; --fg: #dce4de; --sage: #9aaa92; --clay: #4a4640;
    --clay-light: #242a26; --stone: #333b35; --terracotta: #d4896f;
    --card-bg: #222822; --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.4);
    --grain-opacity: 0.03;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--fg);
    line-height: 1.7; font-weight: 400; font-size: 16px;
    -webkit-font-smoothing: antialiased; transition: background 0.4s ease, color 0.4s ease;
  }
  .grain-overlay {
    pointer-events: none; position: fixed; inset: 0; z-index: 9999;
    opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-repeat: repeat; transition: opacity 0.4s ease;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
  .fade-in {
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ===== TOOLBAR ===== */
  .toolbar {
    position: sticky; top: 0; z-index: 100; background: var(--bg);
    border-bottom: 1px solid var(--stone); padding: 0.6rem 0;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .toolbar-inner {
    max-width: 720px; margin: 0 auto; padding: 0 1.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .toolbar-brand {
    font-family: var(--serif); font-size: 1.25rem; font-weight: 700;
    color: var(--fg); letter-spacing: -0.02em; margin-right: auto;
    text-decoration: none;
  }
  .toolbar-brand em { font-style: italic; }
  .tool-btn {
    font-family: var(--sans); font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: none; border: 1px solid var(--stone); color: var(--sage);
    padding: 0.3rem 0.7rem; border-radius: var(--radius-pill);
    cursor: pointer; transition: all 0.3s ease; line-height: 1.4;
  }
  .tool-btn:hover { border-color: var(--sage); color: var(--fg); }
  .tool-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

  /* ===== HEADER (removed — brand is in toolbar now) ===== */

  /* ===== SECTION ===== */
  .section { padding: 2.5rem 0; }
  .section-header {
    display: flex; align-items: baseline; gap: 0.75rem;
    margin-bottom: 1.75rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--stone); transition: border-color 0.4s ease;
  }
  .section-icon { font-size: 1.3rem; flex-shrink: 0; }
  .section-title { font-family: var(--serif); font-size: 1.6rem; font-weight: 600; color: var(--fg); }
  .section-right {
    margin-left: auto; display: flex; align-items: baseline; gap: 0.75rem;
  }
  .section-count {
    font-family: var(--sans); font-size: 0.7rem; color: var(--sage);
    font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .section-date {
    font-family: var(--serif); font-size: 0.75rem; color: var(--sage);
    font-style: italic; font-weight: 400; white-space: nowrap;
  }

  /* ===== CARDS ===== */
  .card-list { display: flex; flex-direction: column; gap: 1rem; }
  .card {
    background: var(--card-bg); border: 1px solid var(--stone);
    border-radius: var(--radius-card); padding: 1.5rem 1.75rem;
    transition: box-shadow 0.5s ease-out, background 0.4s ease, border-color 0.4s ease;
    position: relative; cursor: pointer;
  }
  .card:hover { box-shadow: var(--shadow-xl); }
  .card-title {
    font-family: var(--serif); font-size: 1.1rem; font-weight: 600;
    color: var(--fg); line-height: 1.4; transition: color 0.3s ease;
  }
  .card:hover .card-title { color: var(--terracotta); }
  .card-date {
    font-size: 0.75rem; color: var(--sage); font-weight: 400;
    margin-top: 0.3rem; font-style: italic; opacity: 0.7;
  }
  .card-preview {
    font-size: 0.88rem; color: var(--sage); margin-top: 0.5rem;
    line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta {
    display: flex; align-items: center; gap: 0.4rem;
    margin-top: 0.75rem; flex-wrap: wrap;
  }
  .source-pill {
    display: inline-block; font-size: 0.6rem; font-weight: 600;
    padding: 0.15rem 0.5rem; border-radius: var(--radius-pill);
    text-transform: uppercase; letter-spacing: 0.08em; color: #fff; background: var(--fg);
  }
  .src-hacker_news { background: #D4764E; }
  .src-github_trending, .src-github_releases { background: #6B8F71; }
  .src-reddit_programming, .src-reddit_ml, .src-reddit_experienceddevs { background: #B85A4A; }
  .src-techcrunch { background: #5B8A6A; }
  .src-lobsters { background: #9E5B5B; }
  .src-tldr { background: #7B7FA3; }
  .src-vercel_blog { background: #555; }
  .src-huggingface_blog { background: #C2923C; }
  .src-devto { background: #6B7E73; }
  .tag-pill {
    display: inline-block; font-size: 0.6rem; font-weight: 500;
    padding: 0.1rem 0.45rem; border-radius: var(--radius-pill);
    border: 1px solid var(--stone); color: var(--sage); letter-spacing: 0.03em;
    transition: border-color 0.3s ease;
  }
  .score-badge {
    margin-left: auto; font-family: var(--serif); font-size: 0.8rem;
    font-weight: 600; color: var(--terracotta); white-space: nowrap;
  }

  /* ===== EXPANDED DETAIL ===== */
  .card-detail {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.5s ease-out, opacity 0.4s ease-out, margin-top 0.4s ease-out;
    margin-top: 0;
  }
  .card.open .card-detail { max-height: 800px; opacity: 1; margin-top: 1.25rem; }
  .card.open .card-preview { display: none; }
  .card.open { background: var(--clay-light); }
  .detail-divider { border: none; border-top: 1px solid var(--stone); margin: 0 0 1rem; }
  .detail-text { font-size: 0.95rem; color: var(--fg); line-height: 1.8; font-weight: 400; }
  .detail-origin {
    display: inline-flex; align-items: center; gap: 0.35rem;
    margin-top: 1.25rem; font-size: 0.8rem; font-weight: 500;
    color: var(--sage); text-decoration: none;
    padding: 0.4rem 0.9rem; border: 1px solid var(--stone);
    border-radius: var(--radius-pill); transition: all 0.3s ease;
  }
  .detail-origin:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .detail-arrow { display: inline-block; transition: transform 0.3s ease; font-size: 0.9rem; }
  .detail-origin:hover .detail-arrow { transform: translateX(3px); }

  /* ===== VINE ===== */
  .vine-separator { display: block; margin: 1.5rem auto; opacity: 0.3; }
  html.dark .vine-separator { opacity: 0.15; }

  /* ===== FAILED ===== */
  .failed-section {
    margin: 3rem 0; padding: 1.5rem 2rem; background: var(--clay-light);
    border-radius: var(--radius-card); border: 1px solid var(--stone);
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .failed-toggle {
    cursor: pointer; font-size: 0.85rem; color: var(--sage);
    font-weight: 500; letter-spacing: 0.05em; list-style: none;
  }
  .failed-toggle::-webkit-details-marker { display: none; }
  .failed-toggle::before {
    content: '\203A'; display: inline-block; margin-right: 0.5rem;
    transition: transform 0.3s ease; font-size: 1rem;
  }
  details[open] .failed-toggle::before { transform: rotate(90deg); }
  .failed-list { margin-top: 0.75rem; line-height: 2; }
  .failed-item {
    display: inline-block; padding: 0.15rem 0.6rem; margin: 0.15rem;
    background: var(--card-bg); border: 1px solid var(--stone);
    border-radius: var(--radius-pill); font-size: 0.7rem; color: var(--sage);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center; padding: 4rem 0 3rem; color: var(--sage);
    font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .site-footer::before {
    content: ''; display: block; width: 40px; height: 1px;
    background: var(--stone); margin: 0 auto 2rem; transition: background 0.4s ease;
  }

  @media (max-width: 767px) {
    .container { padding: 0 1rem; }
    .toolbar-inner { padding: 0 1rem; }
    .toolbar-brand { font-size: 1.05rem; }
    .tool-btn { font-size: 0.6rem; padding: 0.25rem 0.55rem; }
    .section { padding: 1.5rem 0; }
    .section-header { flex-wrap: wrap; gap: 0.4rem; }
    .section-title { font-size: 1.2rem; }
    .section-right { width: 100%; gap: 0.5rem; margin-left: 0; }
    .section-date { font-size: 0.65rem; }
    .section-count { font-size: 0.6rem; }
    .card { padding: 1.1rem 1.25rem; }
    .card-title { font-size: 0.95rem; }
    .card-preview { font-size: 0.82rem; }
    .card-meta { gap: 0.3rem; }
    .card.open .card-detail { max-height: 1200px; }
    .detail-text { font-size: 0.9rem; }
    .source-pill { font-size: 0.55rem; }
    .tag-pill { font-size: 0.55rem; }
    .score-badge { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<div class="grain-overlay" aria-hidden="true"></div>

<nav class="toolbar">
  <div class="toolbar-inner">
    <a class="toolbar-brand" href="/">Dev<em>Story</em></a>
    <button class="tool-btn active" id="btnKo" type="button">KO</button>
    <button class="tool-btn" id="btnEn" type="button">EN</button>
    <button class="tool-btn" id="btnTheme" type="button" aria-label="Toggle dark mode"></button>
  </div>
</nav>

<div class="container" style="padding-top:2rem">

  <main id="content"></main>

  <details class="failed-section fade-in" id="failedSection" style="display:none">
    <summary class="failed-toggle" id="failedToggleText"></summary>
    <div class="failed-list" id="failedList"></div>
  </details>

  <footer class="site-footer">
    <span>Collected by DevStory</span>
  </footer>
</div>

<script>
/* ===== i18n ===== */
var I18N = {
  ko: {
    categories: {
      news_blogs:  { icon: '\u{1F343}', label: '\uB274\uC2A4 & \uBE14\uB85C\uADF8' },
      ai_research: { icon: '\u{1F52C}', label: 'AI & ML \uB9AC\uC11C\uCE58' },
      github_oss:  { icon: '\u{1F331}', label: 'GitHub & \uC624\uD508\uC18C\uC2A4' },
      community:   { icon: '\u{1F33F}', label: '\uCEE4\uBBA4\uB2C8\uD2F0 \uD1A0\uB860' },
      eng_blogs:   { icon: '\u{1FAB4}', label: '\uC5D4\uC9C0\uB2C8\uC5B4\uB9C1 \uBE14\uB85C\uADF8' }
    },
    latest: '\uCD5C\uC2E0',
    viewOriginal: '\uC6D0\uBB38 \uBCF4\uAE30',
    failedSources: '\uC2E4\uD328\uD55C \uC18C\uC2A4 \uBCF4\uAE30',
    items: '\uAC1C',
    weekdays: ['\uC77C', '\uC6D4', '\uD654', '\uC218', '\uBAA9', '\uAE08', '\uD1A0'],
    dateFmt: function(d) {
      return d.getFullYear() + '\uB144 ' + (d.getMonth()+1) + '\uC6D4 ' + d.getDate() + '\uC77C '
        + this.weekdays[d.getDay()] + '\uC694\uC77C';
    },
    timeFmt: function(d) {
      return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    },
    pubDate: function(d) {
      return (d.getMonth()+1) + '\uC6D4 ' + d.getDate() + '\uC77C ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    },
    darkLabel: '\u263E',
    lightLabel: '\u2600'
  },
  en: {
    categories: {
      news_blogs:  { icon: '\u{1F343}', label: 'News & Blogs' },
      ai_research: { icon: '\u{1F52C}', label: 'AI & ML Research' },
      github_oss:  { icon: '\u{1F331}', label: 'GitHub & Open Source' },
      community:   { icon: '\u{1F33F}', label: 'Community Discussions' },
      eng_blogs:   { icon: '\u{1FAB4}', label: 'Engineering Blogs' }
    },
    latest: 'Latest',
    viewOriginal: 'View Original',
    failedSources: 'View failed sources',
    items: 'items',
    weekdays: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    dateFmt: function(d) {
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return this.weekdays[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    },
    timeFmt: function(d) {
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    },
    pubDate: function(d) {
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    },
    darkLabel: '\u263E',
    lightLabel: '\u2600'
  }
};

var currentLang = localStorage.getItem('ds-lang') || 'ko';
var currentTheme = localStorage.getItem('ds-theme') || 'light';
var globalData = null;

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      var v = attrs[k];
      if (k === 'className') e.className = v;
      else if (k === 'textContent') e.textContent = v;
      else e.setAttribute(k, v);
    }
  }
  if (children) {
    var list = Array.isArray(children) ? children : [children];
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      if (!c) continue;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    }
  }
  return e;
}

function createVineSvg() {
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '120'); svg.setAttribute('height', '24');
  svg.setAttribute('viewBox', '0 0 120 24'); svg.setAttribute('fill', 'none');
  svg.setAttribute('class', 'vine-separator');
  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M0 12 Q20 2 40 12 Q60 22 80 12 Q100 2 120 12');
  path.setAttribute('stroke', '#8C9A84'); path.setAttribute('stroke-width', '1');
  svg.appendChild(path); return svg;
}

function getTitle(item) { return currentLang === 'ko' ? item.title_ko : item.title; }
function getSummary(item) {
  if (currentLang === 'en') {
    var en = item.detail_en || '';
    if (en) {
      var first = en.split('\n')[0];
      return first.length > 150 ? first.substring(0, 147) + '...' : first;
    }
    return item.summary_ko;
  }
  return item.summary_ko;
}
function getDetail(item) {
  if (currentLang === 'en') return item.detail_en || item.detail_ko || item.summary_ko;
  return item.detail_ko || item.summary_ko;
}

function formatPubDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  return I18N[currentLang].pubDate(d);
}

function createCard(item) {
  var t = I18N[currentLang];
  var card = el('div', { className: 'card fade-in' });
  card.addEventListener('click', function(e) {
    if (e.target.closest('.detail-origin')) return;
    card.classList.toggle('open');
  });

  card.appendChild(el('div', { className: 'card-title', textContent: getTitle(item) }));

  var pubDate = formatPubDate(item.published_at);
  if (pubDate) card.appendChild(el('div', { className: 'card-date', textContent: pubDate }));

  card.appendChild(el('p', { className: 'card-preview', textContent: getSummary(item) }));

  var meta = el('div', { className: 'card-meta' });
  var srcClass = 'source-pill src-' + item.source.replace(/[^a-z_]/g, '');
  meta.appendChild(el('span', { className: srcClass, textContent: item.source }));
  (item.tags || []).slice(0, 3).forEach(function(tag) {
    meta.appendChild(el('span', { className: 'tag-pill', textContent: tag }));
  });
  meta.appendChild(el('span', { className: 'score-badge', textContent: '\u2736 ' + item.score }));
  card.appendChild(meta);

  var detail = el('div', { className: 'card-detail' });
  detail.appendChild(el('hr', { className: 'detail-divider' }));
  var detailContent = getDetail(item);
  var paragraphs = detailContent.split('\n').filter(function(p) { return p.trim().length > 0; });
  for (var pi = 0; pi < paragraphs.length; pi++) {
    var p = el('p', { className: 'detail-text', textContent: paragraphs[pi].trim() });
    if (pi < paragraphs.length - 1) p.style.marginBottom = '0.75rem';
    detail.appendChild(p);
  }
  var originLink = el('a', { className: 'detail-origin', href: item.url, target: '_blank', rel: 'noopener' });
  originLink.appendChild(document.createTextNode(t.viewOriginal));
  originLink.appendChild(el('span', { className: 'detail-arrow', textContent: ' \u2192' }));
  detail.appendChild(originLink);
  card.appendChild(detail);

  return card;
}

function render(data) {
  var t = I18N[currentLang];
  var items = data.items;
  var meta = data.meta;

  var dateObj = new Date(data.collected_at);
  var dateStr = t.dateFmt(dateObj) + ' \u00B7 ' + t.timeFmt(dateObj) + ' ' + t.latest;

  var content = document.getElementById('content');
  content.textContent = '';

  var categories = ['news_blogs', 'ai_research', 'github_oss', 'community', 'eng_blogs'];
  var rendered = 0;
  for (var c = 0; c < categories.length; c++) {
    var cat = categories[c];
    var catItems = items.filter(function(it) { return it.category === cat; });
    if (catItems.length === 0) continue;
    if (rendered > 0) content.appendChild(createVineSvg());
    var cfg = t.categories[cat];

    var section = el('div', { className: 'section fade-in' });
    var header = el('div', { className: 'section-header' });
    header.appendChild(el('span', { className: 'section-icon', textContent: cfg.icon }));
    header.appendChild(el('h2', { className: 'section-title', textContent: cfg.label }));
    var right = el('div', { className: 'section-right' });
    right.appendChild(el('span', { className: 'section-date', textContent: dateStr }));
    right.appendChild(el('span', { className: 'section-count', textContent: catItems.length + ' ' + t.items }));
    header.appendChild(right);
    section.appendChild(header);
    var list = el('div', { className: 'card-list' });
    for (var i = 0; i < catItems.length; i++) list.appendChild(createCard(catItems[i]));
    section.appendChild(list);
    content.appendChild(section);
    rendered++;
  }

  // Failed sources
  var failedSection = document.getElementById('failedSection');
  document.getElementById('failedToggleText').textContent = t.failedSources;
  if (meta.sources_failed.length > 0) {
    failedSection.style.display = 'block';
    var failedList = document.getElementById('failedList');
    failedList.textContent = '';
    for (var f = 0; f < meta.sources_failed.length; f++) {
      failedList.appendChild(el('span', { className: 'failed-item', textContent: meta.sources_failed[f] }));
    }
  }

  requestAnimationFrame(function() {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.fade-in').forEach(function(e) { observer.observe(e); });
  });
}

/* ===== THEME ===== */
function applyTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('ds-theme', theme);
  if (theme === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  document.getElementById('btnTheme').textContent =
    theme === 'dark' ? I18N[currentLang].lightLabel : I18N[currentLang].darkLabel;
}

/* ===== LANG ===== */
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('ds-lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnTheme').textContent =
    currentTheme === 'dark' ? I18N[lang].lightLabel : I18N[lang].darkLabel;
  if (globalData) render(globalData);
}

/* ===== INIT ===== */
document.getElementById('btnKo').addEventListener('click', function() { applyLang('ko'); });
document.getElementById('btnEn').addEventListener('click', function() { applyLang('en'); });
document.getElementById('btnTheme').addEventListener('click', function() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

applyTheme(currentTheme);
document.getElementById('btnKo').classList.toggle('active', currentLang === 'ko');
